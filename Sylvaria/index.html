<title>Roadmap — Royaume Animalier</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #f5f4f0;
    color: #1a1a18;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ─── HEADER ─── */
  header {
    background: #1a1a18;
    color: #f5f4f0;
    padding: 28px 40px 24px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  header p  { font-size: 13px; color: #888780; margin-top: 4px; }
  .header-stats { display: flex; gap: 24px; }
  .stat { text-align: right; }
  .stat-val { font-size: 22px; font-weight: 600; color: #f5f4f0; }
  .stat-lbl { font-size: 11px; color: #888780; text-transform: uppercase; letter-spacing: .5px; }

  /* ─── LEGEND ─── */
  .legend-bar {
    background: #fff;
    border-bottom: 0.5px solid #ddd;
    padding: 10px 40px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .legend-bar span { font-size: 12px; color: #5f5e5a; }
  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: .3px;
    vertical-align: middle;
  }
  .b-core    { background: #e6f1fb; color: #185fa5; }
  .b-eco     { background: #eaf3de; color: #3b6d11; }
  .b-content { background: #faeeda; color: #854f0b; }
  .b-end     { background: #fcebeb; color: #a32d2d; }

  /* ─── LAYOUT ─── */
  .main { padding: 28px 40px; display: flex; flex-direction: column; gap: 18px; }

  /* ─── PHASE CARD ─── */
  .phase {
    background: #fff;
    border-radius: 10px;
    border: 0.5px solid #d3d1c7;
    overflow: hidden;
  }
  .phase-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    cursor: pointer;
    user-select: none;
    border-bottom: 0.5px solid #e8e6df;
    transition: background .12s;
  }
  .phase-header:hover { background: #fafaf7; }
  .phase-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .phase-name { font-size: 15px; font-weight: 600; flex: 1; }
  .phase-duration {
    font-size: 12px; color: #888780;
    background: #f5f4f0;
    padding: 3px 10px;
    border-radius: 20px;
    border: 0.5px solid #d3d1c7;
  }
  .phase-progress {
    font-size: 12px; color: #888780;
    min-width: 60px;
    text-align: right;
  }
  .chevron {
    font-size: 11px; color: #b4b2a9;
    transition: transform .2s;
    flex-shrink: 0;
  }
  .open > .chevron, .chevron.open { transform: rotate(90deg); }

  /* ─── TASK TABLE ─── */
  .phase-body { display: none; }
  .phase-body.open { display: block; }

  table.tasks {
    width: 100%;
    border-collapse: collapse;
  }
  table.tasks thead th {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .4px;
    color: #888780;
    background: #fafaf7;
    padding: 8px 16px;
    text-align: left;
    border-bottom: 0.5px solid #e8e6df;
  }
  table.tasks thead th:last-child { text-align: center; }

  table.tasks tbody tr {
    border-bottom: 0.5px solid #f1efe8;
    transition: background .1s;
  }
  table.tasks tbody tr:last-child { border-bottom: none; }
  table.tasks tbody tr:hover { background: #fafaf7; }
  table.tasks tbody tr.done { opacity: .5; }
  table.tasks tbody tr.done .task-name { text-decoration: line-through; }

  table.tasks td { padding: 11px 16px; vertical-align: top; }

  td.td-icon { width: 36px; padding-right: 0; font-size: 18px; }
  td.td-task { width: 240px; }
  td.td-task .task-name { font-weight: 500; font-size: 14px; }
  td.td-task .task-detail { font-size: 12px; color: #5f5e5a; margin-top: 3px; }
  td.td-task .task-dep { font-size: 11px; color: #b4b2a9; margin-top: 2px; }

  td.td-plugins { vertical-align: top; }
  .plugin-list { display: flex; flex-direction: column; gap: 5px; }
  .plugin-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }
  .plugin-item input[type=checkbox] {
    width: 14px; height: 14px;
    accent-color: #185fa5;
    cursor: pointer;
    flex-shrink: 0;
    margin: 0;
  }
  .plugin-name { font-weight: 500; color: #1a1a18; }
  .plugin-desc { font-size: 11px; color: #888780; margin-top: 1px; }
  .plugin-link {
    font-size: 10px;
    color: #378add;
    text-decoration: none;
    background: #e6f1fb;
    padding: 1px 5px;
    border-radius: 3px;
    white-space: nowrap;
  }
  .plugin-link:hover { background: #b5d4f4; }

  td.td-check { width: 70px; text-align: center; vertical-align: middle; }
  td.td-check input[type=checkbox] {
    width: 16px; height: 16px;
    accent-color: #3b6d11;
    cursor: pointer;
  }

  /* ─── PROGRESS BAR ─── */
  .prog-wrap { height: 3px; background: #f1efe8; border-radius: 2px; margin-top: 4px; overflow: hidden; }
  .prog-bar  { height: 100%; border-radius: 2px; transition: width .3s; }

  /* ─── PRINT ─── */
  @media print {
    body { background: #fff; }
    .phase-body { display: block !important; }
    .chevron { display: none; }
    header { background: #1a1a18 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>

// ─── BUILD DOM ───
const main = document.getElementById('main');
let totalTasks = 0;

phases.forEach(phase => {
  totalTasks += phase.tasks.length;

  const section = document.createElement('div');
  section.className = 'phase';
  section.id = 'phase-' + phase.id;

  // Header
  const header = document.createElement('div');
  header.className = 'phase-header';
  header.innerHTML = `
    <span class="phase-dot" style="background:${phase.color}"></span>
    <span class="phase-name">${phase.label}</span>
    <span class="phase-duration">${phase.duration}</span>
    <span class="phase-progress" id="prog-label-${phase.id}">0 / ${phase.tasks.length}</span>
    <span class="chevron" id="chev-${phase.id}">▶</span>
  `;
  header.onclick = () => togglePhase(phase.id);

  // Progress bar
  const progWrap = document.createElement('div');
  progWrap.className = 'prog-wrap';
  progWrap.innerHTML = `<div class="prog-bar" id="prog-bar-${phase.id}" style="width:0%;background:${phase.color}"></div>`;

  // Body
  const body = document.createElement('div');
  body.className = 'phase-body';
  body.id = 'body-' + phase.id;

  const table = document.createElement('table');
  table.className = 'tasks';
  table.innerHTML = `
    <thead>
      <tr>
        <th style="width:36px"></th>
        <th style="width:260px">Fonctionnalité</th>
        <th>Plugins recommandés</th>
        <th style="width:80px;text-align:center">Fait</th>
      </tr>
    </thead>
    <tbody id="tbody-${phase.id}"></tbody>
  `;

  const tbody = table.querySelector('tbody');

  phase.tasks.forEach((task, ti) => {
    const tr = document.createElement('tr');
    tr.id = `tr-${phase.id}-${ti}`;

    const badgeMap = { 'b-core':'Core','b-eco':'Éco','b-content':'Contenu','b-end':'End-game' };

    tr.innerHTML = `
      <td class="td-icon">${task.icon}</td>
      <td class="td-task">
        <div class="task-name"><span class="badge ${task.badge}">${badgeMap[task.badge]}</span> ${task.name}</div>
        <div class="task-detail">${task.detail}</div>
        ${task.dep ? `<div class="task-dep">⤷ ${task.dep}</div>` : ''}
      </td>
      <td class="td-plugins">
        <div class="plugin-list">
          ${task.plugins.map((p,pi) => `
            <div class="plugin-item">
              <input type="checkbox" id="plg-${phase.id}-${ti}-${pi}"
                     onchange="updateCounts()"
                     title="${p.name}">
              <div>
                <div class="plugin-name">
                  ${p.link && p.link !== '#'
                    ? `<a href="${p.link}" target="_blank" class="plugin-link">${p.name} ↗</a>`
                    : p.name}
                </div>
                <div class="plugin-desc">${p.desc}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </td>
      <td class="td-check">
        <input type="checkbox" id="task-${phase.id}-${ti}"
               onchange="onTaskCheck(${phase.id}, ${ti}, this.checked)">
      </td>
    `;

    tbody.appendChild(tr);
  });

  section.appendChild(header);
  section.appendChild(progWrap);
  section.appendChild(body);
  body.appendChild(table);
  main.appendChild(section);
});

document.getElementById('total-tasks').textContent = totalTasks;
updateCounts();

// ─── TOGGLE ───
function togglePhase(id) {
  const body = document.getElementById('body-' + id);
  const chev = document.getElementById('chev-' + id);
  const open = body.classList.toggle('open');
  chev.classList.toggle('open', open);
}

// Open phase 1 by default
togglePhase(1);

// ─── TASK CHECK ───
function onTaskCheck(phaseId, taskIdx, checked) {
  const tr = document.getElementById(`tr-${phaseId}-${taskIdx}`);
  if (checked) tr.classList.add('done');
  else         tr.classList.remove('done');
  updateCounts();
}

// ─── COUNTS ───
function updateCounts() {
  let totalDone = 0;
  let totalPluginsDone = 0;

  phases.forEach(phase => {
    let phaseDone = 0;
    phase.tasks.forEach((task, ti) => {
      const cb = document.getElementById(`task-${phase.id}-${ti}`);
      if (cb && cb.checked) phaseDone++;

      task.plugins.forEach((_, pi) => {
        const pcb = document.getElementById(`plg-${phase.id}-${ti}-${pi}`);
        if (pcb && pcb.checked) totalPluginsDone++;
      });
    });

    totalDone += phaseDone;

    const label = document.getElementById(`prog-label-${phase.id}`);
    const bar   = document.getElementById(`prog-bar-${phase.id}`);
    if (label) label.textContent = `${phaseDone} / ${phase.tasks.length}`;
    if (bar)   bar.style.width = `${(phaseDone / phase.tasks.length) * 100}%`;
  });

  document.getElementById('total-done').textContent = totalDone;
  document.getElementById('total-plugins').textContent = totalPluginsDone;
}

// ─── SAVE STATE (localStorage) ───
function saveState() {
  const state = {};
  phases.forEach(phase => {
    phase.tasks.forEach((task, ti) => {
      const cb = document.getElementById(`task-${phase.id}-${ti}`);
      state[`task-${phase.id}-${ti}`] = cb ? cb.checked : false;
      task.plugins.forEach((_, pi) => {
        const pcb = document.getElementById(`plg-${phase.id}-${ti}-${pi}`);
        state[`plg-${phase.id}-${ti}-${pi}`] = pcb ? pcb.checked : false;
      });
    });
  });
  try { localStorage.setItem('roadmap_ra_state', JSON.stringify(state)); } catch(e) {}
}

function loadState() {
  let state;
  try { state = JSON.parse(localStorage.getItem('roadmap_ra_state') || '{}'); } catch(e) { return; }
  phases.forEach(phase => {
    phase.tasks.forEach((task, ti) => {
      const cb = document.getElementById(`task-${phase.id}-${ti}`);
      if (cb && state[`task-${phase.id}-${ti}`]) {
        cb.checked = true;
        document.getElementById(`tr-${phase.id}-${ti}`)?.classList.add('done');
      }
      task.plugins.forEach((_, pi) => {
        const pcb = document.getElementById(`plg-${phase.id}-${ti}-${pi}`);
        if (pcb && state[`plg-${phase.id}-${ti}-${pi}`]) pcb.checked = true;
      });
    });
  });
  updateCounts();
}

document.addEventListener('change', saveState);
loadState();
